<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- White background with subtle rounded corners -->
  <rect x="0" y="0" width="64" height="64" rx="10" fill="#ffffff"/>

  <!-- Bold clean flame - centered, fills the space -->
  <g transform="translate(32, 32)">

    <!-- Outer flame body -->
    <path d="
      M0,-26
      C6,-18 14,-10 14,0
      C14,8 10,14 6,18
      C8,12 6,6 2,4
      C4,10 2,18 0,22
      C-2,18 -4,10 -2,4
      C-6,6 -8,12 -6,18
      C-10,14 -14,8 -14,0
      C-14,-10 -6,-18 0,-26
      Z"
      fill="#E8334A"
      opacity="0.18"
    />

    <!-- Mid flame -->
    <path d="
      M0,-18
      C5,-11 10,-5 10,3
      C10,10 7,16 4,19
      C5,13 3,7 0,5
      C-3,7 -5,13 -4,19
      C-7,16 -10,10 -10,3
      C-10,-5 -5,-11 0,-18
      Z"
      fill="#E8334A"
      opacity="0.55"
    />

    <!-- Core flame — solid bold -->
    <path d="
      M0,-10
      C3,-5 6,0 6,6
      C6,11 4,15 2,17
      C3,12 1,8 0,6
      C-1,8 -3,12 -2,17
      C-4,15 -6,11 -6,6
      C-6,0 -3,-5 0,-10
      Z"
      fill="#E8334A"
    />

    <!-- Glowing base dot -->
    <ellipse cx="0" cy="18" rx="4" ry="2.5" fill="#E8334A" opacity="0.25"/>

  </g>

</svg>
